apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: xdp-failsafe-controller
  namespace: predictive-lb
  labels:
    app.kubernetes.io/component: ebpf-failsafe
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: ebpf-failsafe
  template:
    metadata:
      labels:
        app.kubernetes.io/component: ebpf-failsafe
    spec:
      # XDP needs access to host network and PID namespace
      hostPID:     true
      hostNetwork: true
      dnsPolicy:   ClusterFirstWithHostNet

      tolerations:
        - operator: Exists   # run on all nodes including control-plane

      containers:
        - name: xdp-failsafe
          image: predictive-lb/ebpf-controller:latest
          imagePullPolicy: IfNotPresent

          # Controller arguments — adjust per environment
          args:
            - python3
            - controller.py
            - --interface
            - eth0
            - --lb-host
            - "$(LB_SERVICE_HOST)"   # injected by K8s service env
            - --fallback-ip
            - "$(FALLBACK_IP)"
            - --fallback-mac
            - "$(FALLBACK_MAC)"

          env:
            - name: LB_SERVICE_HOST
              value: "load-balancer.predictive-lb.svc.cluster.local"
            - name: FALLBACK_IP
              value: "10.0.0.1"   # override per cluster
            - name: FALLBACK_MAC
              value: "02:00:00:00:00:01"

          # Required privileges for BPF + XDP
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
                - SYS_ADMIN
                - BPF

          ports:
            - containerPort: 9100
              name: metrics
              protocol: TCP

          volumeMounts:
            - name: bpf-fs
              mountPath: /sys/fs/bpf
            - name: lib-modules
              mountPath: /lib/modules
              readOnly: true
            - name: usr-src
              mountPath: /usr/src
              readOnly: true

      volumes:
        - name: bpf-fs
          hostPath:
            path: /sys/fs/bpf
            type: Directory
        - name: lib-modules
          hostPath:
            path: /lib/modules
            type: Directory
        - name: usr-src
          hostPath:
            path: /usr/src
            type: Directory

---
apiVersion: v1
kind: Service
metadata:
  name: xdp-failsafe-metrics
  namespace: predictive-lb
  labels:
    app.kubernetes.io/component: ebpf-failsafe
spec:
  selector:
    app.kubernetes.io/component: ebpf-failsafe
  ports:
    - name: metrics
      port: 9100
      targetPort: 9100
  type: ClusterIP
