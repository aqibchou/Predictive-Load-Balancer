syntax = "proto3";
package telemetry;

message TelemetryPayload {
  string server_id            = 1;
  float  cpu_percent          = 2;   // psutil.cpu_percent()
  float  memory_percent       = 3;   // psutil.virtual_memory().percent
  int32  active_requests      = 4;
  float  avg_response_time_ms = 5;
  float  cache_hit_rate       = 6;
  int64  timestamp_ns         = 7;
  int32  total_requests       = 8;
  int32  cache_size           = 9;
}

message Ack {
  bool   received  = 1;
  string server_id = 2;
}

service TelemetryService {
  // Bidirectional: backend streams payloads; LB sends periodic ACKs
  rpc StreamTelemetry(stream TelemetryPayload) returns (stream Ack);
}
