version: '3.8'

services:
  # PostgreSQL for metrics
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: loadbalancer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - loadbalancer_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Load balancer
  load_balancer:
    build: ./load_balancer
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - backend
    volumes:
      - ./config/servers.yaml:/app/config/servers.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock  
      - .:/mnt/project:ro
    networks:
      - loadbalancer_net

  # Scalable backend service (replaces backend_1, backend_2, backend_3)
  backend:
    build: ./backend
    environment:
      SERVER_ID: ${HOSTNAME}
    networks:
      - loadbalancer_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  loadbalancer_net:
    driver: bridge

volumes:
  postgres_data: