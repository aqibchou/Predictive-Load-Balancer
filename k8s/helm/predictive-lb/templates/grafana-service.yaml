apiVersion: v1
kind: Service
metadata:
  name: {{ include "predictive-lb.fullname" . }}-grafana
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "predictive-lb.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  type: {{ .Values.grafana.service.type }}
  ports:
    - port: {{ .Values.grafana.service.port }}
      targetPort: 3000
      protocol: TCP
  selector:
    {{- include "predictive-lb.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
