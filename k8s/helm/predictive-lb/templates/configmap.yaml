apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "predictive-lb.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "predictive-lb.labels" . | nindent 4 }}
data:
  servers.yaml: |
    servers:
    {{- range .Values.backends }}
      - id: {{ .id }}
        url: "http://{{ include "predictive-lb.fullname" $ }}-backend:{{ $.Values.backend.service.port }}"
        weight: {{ .weight }}
    {{- end }}

  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.prometheus.scrapeInterval }}
    scrape_configs:
      - job_name: loadbalancer
        static_configs:
          - targets:
              - {{ include "predictive-lb.fullname" . }}-loadbalancer:{{ .Values.loadBalancer.service.port }}
