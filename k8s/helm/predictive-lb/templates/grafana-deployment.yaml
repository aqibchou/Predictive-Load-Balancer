apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "predictive-lb.fullname" . }}-grafana
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "predictive-lb.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "predictive-lb.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        {{- include "predictive-lb.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: grafana
    spec:
      containers:
        - name: grafana
          image: "{{ .Values.grafana.image.repository }}:{{ .Values.grafana.image.tag }}"
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "predictive-lb.fullname" . }}-secret
                  key: grafana-password
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning
          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}
          volumeMounts:
            - name: grafana-config
              mountPath: /etc/grafana/provisioning/datasources
              subPath: datasources.yml
              readOnly: true
            - name: grafana-config
              mountPath: /etc/grafana/provisioning/dashboards/dashboard-provider.yml
              subPath: dashboard-provider.yml
              readOnly: true
            - name: grafana-config
              mountPath: /etc/grafana/provisioning/dashboards/loadbalancer.json
              subPath: loadbalancer.json
              readOnly: true
            - name: grafana-data
              mountPath: /var/lib/grafana
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: grafana-config
          configMap:
            name: {{ include "predictive-lb.fullname" . }}-grafana-config
        - name: grafana-data
          emptyDir: {}
