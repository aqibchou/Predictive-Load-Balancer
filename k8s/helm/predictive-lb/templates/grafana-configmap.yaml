apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "predictive-lb.fullname" . }}-grafana-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "predictive-lb.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://{{ include "predictive-lb.fullname" . }}-prometheus:{{ .Values.prometheus.service.port }}
        isDefault: true

  dashboard-provider.yml: |
    apiVersion: 1
    providers:
      - name: Default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /etc/grafana/provisioning/dashboards

  loadbalancer.json: |
{{ .Files.Get "files/dashboards/loadbalancer.json" | indent 4 }}
