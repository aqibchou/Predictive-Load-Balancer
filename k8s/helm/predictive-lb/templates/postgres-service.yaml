apiVersion: v1
kind: Service
metadata:
  name: {{ include "predictive-lb.fullname" . }}-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "predictive-lb.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  clusterIP: None   # headless — required for StatefulSet stable DNS
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    {{- include "predictive-lb.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
