apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "predictive-lb.fullname" . }}-loadbalancer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "predictive-lb.labels" . | nindent 4 }}
    app.kubernetes.io/component: loadbalancer
spec:
  replicas: {{ .Values.loadBalancer.replicaCount }}
  selector:
    matchLabels:
      {{- include "predictive-lb.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: loadbalancer
  template:
    metadata:
      labels:
        {{- include "predictive-lb.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: loadbalancer
    spec:
      serviceAccountName: {{ include "predictive-lb.serviceAccountName" . }}
      containers:
        - name: load-balancer
          image: "{{ .Values.loadBalancer.image.repository }}:{{ .Values.loadBalancer.image.tag }}"
          imagePullPolicy: {{ .Values.loadBalancer.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "predictive-lb.fullname" . }}-secret
                  key: database-url
            - name: REDIS_URL
              value: "redis://{{ include "predictive-lb.fullname" . }}-redis:6379"
            - name: CONFIG_PATH
              value: /app/config/servers.yaml
            - name: K8S_SCALING_ENABLED
              value: {{ .Values.loadBalancer.k8sScaling.enabled | quote }}
            - name: K8S_BACKEND_DEPLOYMENT
              value: {{ include "predictive-lb.fullname" . }}-backend
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            {{- toYaml .Values.loadBalancer.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /app/config
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: {{ include "predictive-lb.fullname" . }}-config
            items:
              - key: servers.yaml
                path: servers.yaml
