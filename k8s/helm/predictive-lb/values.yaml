nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

# ── Load Balancer ─────────────────────────────────────────────────────────────
loadBalancer:
  image:
    repository: ghcr.io/YOUR_ORG/predictive-lb/load-balancer
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  service:
    type: LoadBalancer
    port: 8000
  # K8s-native scaling: replaces docker-compose subprocess with Kubernetes API
  # Set to false if you want to rely solely on the HPA below
  k8sScaling:
    enabled: true

# ── Backend ───────────────────────────────────────────────────────────────────
backend:
  image:
    repository: ghcr.io/YOUR_ORG/predictive-lb/backend
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 3
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  service:
    type: ClusterIP
    port: 8000
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# Backend server definitions for the load balancer's servers.yaml config
# URLs are auto-templated to the backend K8s service; only id and weight matter
backends:
  - id: backend-1
    weight: 1
  - id: backend-2
    weight: 1
  - id: backend-3
    weight: 1

# ── PostgreSQL ────────────────────────────────────────────────────────────────
postgres:
  image:
    repository: postgres
    tag: "14-alpine"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  storage:
    size: 10Gi
    storageClass: ""   # leave empty to use cluster default
  auth:
    username: postgres
    password: ""       # REQUIRED — set via: --set postgres.auth.password=SECRET
    database: loadbalancer

# ── Redis ─────────────────────────────────────────────────────────────────────
redis:
  image:
    repository: redis
    tag: "7-alpine"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ── Prometheus ────────────────────────────────────────────────────────────────
prometheus:
  image:
    repository: prom/prometheus
    tag: v2.51.0
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  storage:
    size: 10Gi
    storageClass: ""
  service:
    type: ClusterIP
    port: 9090
  scrapeInterval: 5s

# ── Grafana ───────────────────────────────────────────────────────────────────
grafana:
  image:
    repository: grafana/grafana
    tag: "10.4.0"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  service:
    type: ClusterIP
    port: 3000
  adminPassword: ""    # REQUIRED — set via: --set grafana.adminPassword=SECRET
  storage:
    size: 5Gi
    storageClass: ""
